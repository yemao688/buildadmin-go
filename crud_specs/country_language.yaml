name: country_language
comment: 全局语言
type: alter
dataScope:
  mode: none
quickSearchField: [lan, name]
fields:
  - name: id
    type: bigint
    primaryKey: true
    autoIncrement: true
    null: false
    designType: pk
    comment: 主键
  - name: lan
    type: varchar
    length: 20
    null: false
    comment: 语言代码
  - name: name
    type: varchar
    length: 50
    null: false
    comment: 语言名称
  - name: remark
    type: varchar
    length: 255
    null: false
    default: ""
    comment: 备注
  - name: status
    type: tinyint
    null: false
    default: "1"
    comment: 状态:0=禁用,1=启用
  - name: weigh
    type: int
    null: false
    default: "0"
    comment: 权重
