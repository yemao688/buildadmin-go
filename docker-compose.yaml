services:
  app:
    image: ${DEPLOY_REGISTRY}/${DEPLOY_IMAGE_NAME}:${DEPLOY_IMAGE_TAG:-latest}
    pull_policy: always
    user: "1000:1000"
    ports:
      - "${APP_PORT:-9989}:9989"
    volumes:
      - ./conf/config.yaml:/app/conf/config.yaml:ro
      - ./storage:/app/storage
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9989/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
